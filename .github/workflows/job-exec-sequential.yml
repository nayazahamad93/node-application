name : sequential jobs

on:
    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
           - name: job1
             run: echo "job1 executed"    

    job2:
        needs : job2
        runs-on: ubuntu-latest
        steps:
           - name: job2
             run: echo "job2 executed"

    job3:
        needs : job3 # if i want to run job in sequentiallu then i can use needs keyword to run job3 after job2
        runs-on: ubuntu-latest
        steps:
           - name: job3
             run: echo "job3 executed"