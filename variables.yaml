name : Variables

on: 
    workflow_dispatch:
        inputs:
            environment:
                description: 'Run environment'
                required: true
                default: 'test'
                type: choice
                options:
                    - dev
                    - prod
                    - test

            version:
               description: 'Application version'
               required: true
               default: '1.0.0'

jobs:
    show-the-variables:
       runs-on: ubuntu-latest
       steps:
            - name: display Inputs
              run: |
                echo "Environment: {{ inputs.environment }}"
                echo "App Version: {{ inputs.version }}"


  